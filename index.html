<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cyber Password Analyzer</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:
            linear-gradient(135deg,#0f172a,#1e293b,#0f172a);

            overflow:hidden;
        }

        /* Background Glow */

        body::before{

            content:"";

            position:absolute;

            width:500px;
            height:500px;

            background:#00ff99;

            border-radius:50%;

            filter:blur(180px);

            top:-120px;
            left:-120px;

            opacity:0.3;
        }

        body::after{

            content:"";

            position:absolute;

            width:400px;
            height:400px;

            background:#00bfff;

            border-radius:50%;

            filter:blur(180px);

            bottom:-120px;
            right:-120px;

            opacity:0.3;
        }

        .container{

            position:relative;

            width:430px;

            padding:40px;

            border-radius:25px;

            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,0.15);

            box-shadow:
            0 8px 32px rgba(0,0,0,0.3);

            color:white;

            z-index:10;

            animation:fadeIn 1s ease;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(20px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        h1{

            text-align:center;

            margin-bottom:30px;

            font-size:38px;

            font-weight:700;

            line-height:1.2;
        }

        .password-box{

            display:flex;

            gap:10px;

            margin-bottom:25px;
        }

        .password-box input{

            flex:1;

            padding:15px;

            border:none;

            outline:none;

            border-radius:14px;

            background:rgba(255,255,255,0.12);

            color:white;

            font-size:16px;

            transition:0.3s;
        }

        .password-box input::placeholder{

            color:#ddd;
        }

        .password-box input:focus{

            border:1px solid #00ff99;

            box-shadow:0 0 12px #00ff99;
        }

        .password-box button{

            padding:15px 18px;

            border:none;

            border-radius:14px;

            background:#00ff99;

            color:black;

            font-weight:600;

            cursor:pointer;

            transition:0.3s;
        }

        .password-box button:hover{

            transform:scale(1.05);

            background:#00cc77;
        }

        .strength-box{

            width:100%;

            height:18px;

            background:rgba(255,255,255,0.15);

            border-radius:20px;

            overflow:hidden;

            margin-bottom:20px;
        }

        .strength-fill{

            height:100%;

            width:0%;

            border-radius:20px;

            transition:0.5s ease;
        }

        #strength-text{

            text-align:center;

            font-size:28px;

            font-weight:700;

            margin-bottom:12px;
        }

        .score{

            text-align:center;

            font-size:18px;

            margin-bottom:25px;

            color:#ddd;
        }

        .tips{

            background:rgba(255,255,255,0.08);

            padding:18px;

            border-radius:15px;
        }

        .tips h3{

            margin-bottom:12px;

            color:#00ff99;
        }

        .tips ul{

            padding-left:20px;
        }

        .tips li{

            margin-bottom:10px;

            color:#eee;

            font-size:15px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Cyber Password Analyzer</h1>

        <div class="password-box">

            <input
                type="password"
                id="password"
                placeholder="Enter Secure Password"
            >

            <button id="toggle-btn">
                Show
            </button>

        </div>

        <div class="strength-box">

            <div class="strength-fill" id="strength-fill"></div>

        </div>

        <p id="strength-text">
            Password Strength
        </p>

        <p class="score" id="score">
            Strength Score: 0/5
        </p>

        <div class="tips">

            <h3>Security Tips</h3>

            <ul>

                <li>Use minimum 8 characters</li>

                <li>Add uppercase letters</li>

                <li>Add lowercase letters</li>

                <li>Add numbers</li>

                <li>Add special symbols</li>

            </ul>

        </div>

    </div>

    <script>

        const password = document.getElementById("password");

        const strengthFill = document.getElementById("strength-fill");

        const strengthText = document.getElementById("strength-text");

        const scoreText = document.getElementById("score");

        const toggleBtn = document.getElementById("toggle-btn");

        // SHOW / HIDE PASSWORD

        toggleBtn.addEventListener("click", () => {

            if(password.type === "password"){

                password.type = "text";

                toggleBtn.innerHTML = "Hide";
            }

            else{

                password.type = "password";

                toggleBtn.innerHTML = "Show";
            }

        });

        // PASSWORD CHECKER

        password.addEventListener("input", () => {

            const value = password.value;

            let strength = 0;

            if(value.length >= 8){
                strength++;
            }

            if(/[A-Z]/.test(value)){
                strength++;
            }

            if(/[a-z]/.test(value)){
                strength++;
            }

            if(/[0-9]/.test(value)){
                strength++;
            }

            if(/[!@#$%^&*]/.test(value)){
                strength++;
            }

            scoreText.innerHTML = `Strength Score: ${strength}/5`;

            // WEAK

            if(strength <= 2){

                strengthFill.style.width = "30%";

                strengthFill.style.background = "#ff4d4d";

                strengthText.innerHTML = "Weak Password";

                strengthText.style.color = "#ff4d4d";
            }

            // MEDIUM

            else if(strength <= 4){

                strengthFill.style.width = "60%";

                strengthFill.style.background = "#ffaa00";

                strengthText.innerHTML = "Medium Password";

                strengthText.style.color = "#ffaa00";
            }

            // STRONG

            else{

                strengthFill.style.width = "100%";

                strengthFill.style.background = "#00ff99";

                strengthText.innerHTML = "Strong Password";

                strengthText.style.color = "#00ff99";
            }

            // EMPTY

            if(value.length === 0){

                strengthFill.style.width = "0%";

                strengthText.innerHTML = "Password Strength";

                strengthText.style.color = "white";

                scoreText.innerHTML = "Strength Score: 0/5";
            }

        });

    </script>

</body>

</html>
